<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>UTT AI SAFETY - COMMAND CENTER</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="app-header glass">
            <div class="header-left">
                <img src="assets/logo.png" alt="UTT Logo" class="app-logo"
                    onerror="this.src='assets/logo.png'; this.onerror=null;">
                <div class="brand-text">
                    <h1>UTT AI SAFETY</h1>
                    <div class="yolo-status">
                        <span class="status-dot pulse"></span>
                        <span id="yolo-status-text">SYSTEM ACTIVE</span>
                    </div>
                </div>
            </div>
            <div class="header-actions">
                <div class="notif-badge-container">
                    <button class="btn-circle" id="btn-notifications">
                        <i data-lucide="bell"></i>
                    </button>
                    <span id="notif-count" class="badge-count">0</span>
                </div>
            </div>
        </header>

        <main class="app-main">
            <!-- SECTION 1: MONITORING (HOME) -->
            <section id="section-home" class="page-section active">

                <!-- Grid Controls + Upload Button ngang hàng -->
                <div class="grid-controls glass">
                    <span id="active-cam-label">CAM 01</span>
                    <div style="display:flex; gap:8px; align-items:center;">
                        <!-- NÚT + CHỌN VIDEO (ngang hàng với select camera) -->
                        <button class="btn-upload-inline" id="btn-upload-video" title="Tải video lên để chạy AI"
                            onclick="document.getElementById('file-upload').click()">
                            <i data-lucide="plus-circle"></i>
                            <span>Video</span>
                        </button>
                        <input type="file" id="file-upload" style="display:none" accept="video/*">

                        <select id="cam-count-select" class="mini-select">
                            <option value="1" selected>1 Camera</option>
                            <option value="2">2 Camera</option>
                            <option value="4">4 Camera</option>
                            <option value="6">6 Camera</option>
                            <option value="8">8 Camera</option>
                        </select>
                    </div>
                </div>

                <!-- MẶC ĐỊNH GRID-1 (1 camera) -->
                <div class="camera-grid grid-1" id="camera-grid-main">
                    <div class="camera-card active" id="primary-cam-card">
                        <div class="cam-info-top">
                            <span class="cam-tag" id="current-stream-tag">LIVE STREAMING</span>
                            <span class="ai-indicator active"></span>
                        </div>
                        <div class="stream-container">
                            <img id="main-stream" src="/video_feed/1" class="stream-view">
                        </div>
                    </div>
                </div>

                <!-- AI MODEL TOGGLES -->
                <div class="ai-filter-bar glass">
                    <label class="chip">
                        <input type="checkbox" id="filter-helmet" checked>
                        <span><i data-lucide="shield"></i> Mũ</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" id="filter-vest" checked>
                        <span><i data-lucide="shirt"></i> Áo</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" id="filter-sign" checked>
                        <span><i data-lucide="octagon"></i> Biển báo</span>
                    </label>
                    <label class="chip">
                        <input type="checkbox" id="filter-pose" checked>
                        <span><i data-lucide="accessibility"></i> Ngã</span>
                    </label>
                </div>
            </section>

            <!-- SECTION 2: SYSTEM -->
            <section id="section-system" class="page-section">
                <div class="section-header">HỆ THỐNG CAMERA</div>
                <div id="system-cam-list" class="cam-list-container"></div>
            </section>

            <!-- SECTION 3: STATS (Lịch sử vi phạm từ DB) -->
            <section id="section-stats" class="page-section">
                <div class="section-header">LỊCH SỬ VI PHẠM</div>
                <div class="table-wrapper glass">
                    <table>
                        <thead>
                            <tr>
                                <th>Thời gian</th>
                                <th>Camera</th>
                                <th>Vi phạm</th>
                            </tr>
                        </thead>
                        <tbody id="stats-table-body"></tbody>
                    </table>
                </div>
            </section>
        </main>

        <nav class="bottom-nav glass">
            <a href="#" class="nav-item active" data-target="home">
                <i data-lucide="home"></i><span>Trang chủ</span>
            </a>
            <a href="#" class="nav-item" data-target="system">
                <i data-lucide="video"></i><span>Hệ thống</span>
            </a>
            <div class="robot-central">
                <div class="robot-circle" id="ai-status-indicator">
                    <i data-lucide="bot"></i>
                </div>
            </div>
            <a href="#" class="nav-item" data-target="stats">
                <i data-lucide="bar-chart-3"></i><span>Thống kê</span>
            </a>
            <a href="#" class="nav-item" data-target="settings">
                <i data-lucide="settings"></i><span>Cài đặt</span>
            </a>
        </nav>
    </div>

    <!-- Audio alerts (phải có user interaction trước khi play) -->
    <audio id="audio-warning" src="assets/warning.WAV" preload="auto"></audio>
    <audio id="audio-alarm" src="assets/alarm.WAV" preload="auto"></audio>
    <script src="src/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('SW registered');
            }).catch(console.error);
        }
    </script>
</body>

</html>
